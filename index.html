<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niebo nad Warszawą</title>
    <script src="https://unpkg.com/astronomy-engine@2.1.19/dist/astronomy.browser.min.js"></script>">
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
        .card { background: #111827; padding: 20px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #1f2937; }
        .phases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .small-card { background: #111827; border: 1px solid #1f2937; border-radius: 15px; padding: 15px; text-align: center; }
        #moon-img { width: 150px; height: 150px; border-radius: 50%; margin: 15px 0; }
        .tag { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .section-title { margin-top: 40px; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>Niebo nad Warszawą</h1>

    <div class="container">
        <div class="card" id="moon-main-card">
            <div id="moon-loader">Ładowanie Księżyca...</div>
            <div id="moon-content" style="display:none">
                <div id="phase-name" style="font-size: 1.2rem; font-weight: bold;">-</div>
                <img id="moon-img" src="" alt="Księżyc">
                <div id="moon-details" style="font-size: 0.9rem; color: #9ca3af;"></div>
            </div>
        </div>
    </div>

    <h2 class="section-title">Planety (Widoczność)</h2>
    <div id="planets-list" class="phases-grid">Ładowanie planet...</div>

    <h2 class="section-title">Najbliższe fazy</h2>
    <div id="upcoming-phases" class="phases-grid"></div>

    <script>
        const LAT = 52.2297; const LON = 21.0122;
        const planetyPl = { "Mercury": "Merkury", "Venus": "Wenus", "Mars": "Mars", "Jupiter": "Jowisz", "Saturn": "Saturn", "Uranus": "Uran", "Neptune": "Neptun" };
        const nazwyFaz = { "NEW_MOON": "Nów", "FIRST_QUARTER": "Pierwsza kwadra", "FULL_MOON": "Pełnia", "LAST_QUARTER": "Ostatnia kwadra", "WAXING_CRESCENT": "Przybywający sierp", "WAXING_GIBBOUS": "Przybywający garbaty", "WANING_GIBBOUS": "Ubywający garbaty", "WANING_CRESCENT": "Ubywający sierp" };
        const plikiZdjec = { "NEW_MOON": "NEW.jpg", "WAXING_CRESCENT": "WAXING-CRESCENT.jpg", "FIRST_QUARTER": "FIRST-QUARTER.jpg", "WAXING_GIBBOUS": "WAXING-GIBBOUS.jpg", "FULL_MOON": "FULL.jpg", "WANING_GIBBOUS": "WANING-GIBBOUS.jpg", "LAST_QUARTER": "THIRD-QUARTER.jpg", "WANING_CRESCENT": "WANING-CRESCENT.jpg" };

        function formatT(d) { return d ? d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' }) : "--:--"; }

        // --- FUNKCJA 1: PLANETY (Niezależna) ---
        async function fetchPlanets() {
            const container = document.getElementById('planets-list');
            try {
                const res = await fetch(`https://api.visibleplanets.dev/v2?latitude=${LAT}&longitude=${LON}`);
                const json = await res.json();
                container.innerHTML = '';

                // Sprawdzamy dostępność biblioteki pod różnymi nazwami
                const AstroLib = window.Astronomy;
                
                if (!AstroLib) {
                    container.innerHTML = "<div style='color:#f87171'>Błąd: Biblioteka astronomiczna nie została załadowana. Spróbuj odświeżyć stronę.</div>";
                    return;
                }

                const obs = new AstroLib.Observer(LAT, LON, 0);
                const now = new Date();

                json.data.forEach(p => {
                    // Próba obliczenia wschodu/zachodu
                    let riseTime = "--:--", setTime = "--:--";
                    try {
                        const rise = AstroLib.SearchRiseSet(p.name, obs, 1, now, 1);
                        const set = AstroLib.SearchRiseSet(p.name, obs, -1, now, 1);
                        if (rise) riseTime = formatT(rise.date);
                        if (set) setTime = formatT(set.date);
                    } catch(e) { /* ciche pominięcie błędów dla pojedynczych planet */ }

                    const isUnder = p.altitude < 0;
                    const div = document.createElement('div');
                    div.className = 'small-card';
                    div.style.opacity = isUnder ? "0.4" : "1";
                    div.innerHTML = `
                        <div class="tag" style="background:${p.naked_eye ? '#1e3a8a':'#374151'}">${p.naked_eye ? 'OKO' : 'TELESKOP'}</div>
                        <div style="font-weight:bold">${planetyPl[p.name] || p.name}</div>
                        <div style="color:#34d399; font-size:12px; margin:5px 0">✨ ${p.constellation}</div>
                        <div style="color:#fbbf24; font-size:13px">🌅 ${riseTime} — 🌇 ${setTime}</div>
                        <div style="font-size:11px; margin-top:5px; color:#9ca3af">${isUnder ? 'Pod horyzontem' : 'Widoczna na niebie'}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = "Błąd połączenia z API Planet.";
                console.error(e);
            }
        }
        // --- FUNKCJA 2: KSIĘŻYC (Niezależna) ---
        async function fetchMoon() {
            try {
                // Używamy pełnego adresu URL, żeby wykluczyć błędy ścieżek relatywnych
                const res = await fetch('https://moon-phases-five.vercel.app/api/get-moon');
                const d = await res.json();

                document.getElementById('phase-name').innerText = nazwyFaz[d.details.phase] || d.details.phase;
                document.getElementById('moon-img').src = "images/" + (plikiZdjec[d.details.phase] || "NEW.jpg");
                document.getElementById('moon-details').innerHTML = `Oświetlenie: ${d.details.illumination}<br>Wschód: ${d.details.rise} | Zachód: ${d.details.set}`;
                
                const up = document.getElementById('upcoming-phases');
                up.innerHTML = '';
                d.upcoming.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'small-card';
                    card.innerHTML = `<div style="font-size:11px; color:#34d399">${p.daysText}</div><b>${nazwyFaz[p.name] || p.name}</b><br><small>${p.date}</small>`;
                    up.appendChild(card);
                });

                document.getElementById('moon-loader').style.display = 'none';
                document.getElementById('moon-content').style.display = 'block';
            } catch (e) {
                document.getElementById('moon-loader').innerText = "Błąd API Księżyca.";
            }
        }

        // Startujemy obie funkcje na raz
        window.onload = () => {
            fetchMoon();
            fetchPlanets();
        };
    </script>
</body>
</html>
