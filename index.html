<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niebo nad Warszawą - System Niezależny</title>
    <script src="https://unpkg.com/astronomy-engine@2.1.19/dist/astronomy.browser.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
        .card { background: #111827; padding: 25px; border-radius: 20px; width: 330px; text-align: center; border: 1px solid #1f2937; }
        #moon-img { width: 160px; height: 160px; border-radius: 50%; margin: 15px auto; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .item { background: #1f2937; padding: 10px; border-radius: 12px; font-size: 0.85rem; }
        .label { color: #6b7280; display: block; font-size: 0.7rem; margin-bottom: 4px; }
        .value { font-weight: bold; color: #f1f5f9; }
        .section-title { width: 100%; max-width: 900px; margin-top: 50px; text-align: center; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; }
        .phases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .small-card { background: #111827; border: 1px solid #1f2937; border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; }
        .tag { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .tag-eye { background: #1e3a8a; color: #93c5fd; }
        .tag-tel { background: #374151; color: #9ca3af; }
        .mini-moon { width: 45px; height: 45px; border-radius: 50%; margin: 10px auto 0; display: block; }
    </style>
</head>
<body>

    <h1>Niebo nad Warszawą</h1>

    <div class="container">
        <div class="card">
            <h2>Aktualny Księżyc</h2>
            <div id="moon-loader">Ładowanie...</div>
            <div id="moon-content" style="display:none">
                <div id="phase-name" style="font-size: 1.4rem; font-weight: bold;">-</div>
                <img id="moon-img" src="" alt="Księżyc">
                <div class="grid">
                    <div class="item"><span class="label">Oświetlenie</span><span class="value" id="illu">-</span></div>
                    <div class="item"><span class="label">Wschód</span><span class="value" id="rise">-</span></div>
                    <div class="item"><span class="label">Zachód</span><span class="value" id="set">-</span></div>
                    <div class="item"><span class="label">Dystans</span><span class="value" id="dist">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <h2 class="section-title">Wszystkie Planety</h2>
    <div id="planets-list" class="phases-grid">Obliczanie pozycji...</div>

    <h2 class="section-title">Nadchodzące fazy</h2>
    <div id="upcoming-phases" class="phases-grid"></div>

   <script>
    const LAT = 52.2297; const LON = 21.0122;
    const planetyPl = { "Mercury": "Merkury", "Venus": "Wenus", "Mars": "Mars", "Jupiter": "Jowisz", "Saturn": "Saturn", "Uranus": "Uran", "Neptune": "Neptun" };
    
    function formatT(d) { return d ? d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' }) : "--:--"; }

    async function loadVisiblePlanets() {
        const container = document.getElementById('planets-list');
        try {
            // Pobieramy TYLKO planety aktualnie widoczne (altitude > 0)
            const res = await fetch(`https://api.visibleplanets.dev/v2?latitude=${LAT}&longitude=${LON}`);
            const json = await res.json();
            
            if (!json.data || json.data.length === 0) {
                container.innerHTML = "<div style='color:#9ca3af; padding:20px;'>Obecnie żadna planeta nie jest widoczna nad Warszawą.</div>";
                return;
            }

            container.innerHTML = '';
            const Astro = window.Astronomy;
            const obs = Astro ? new Astro.Observer(LAT, LON, 0) : null;
            const now = new Date();

            json.data.forEach(p => {
                let hoursHTML = "";
                // Dodajemy godziny tylko jeśli silnik astronomy-engine jest gotowy
                if (Astro && obs) {
                    try {
                        const rise = Astro.SearchRiseSet(p.name, obs, 1, now, 1);
                        const set = Astro.SearchRiseSet(p.name, obs, -1, now, 1);
                        hoursHTML = `<div style="color:#fbbf24; font-size:13px; margin-top:5px; font-weight:bold;">🌅 ${formatT(rise?.date)} — 🌇 ${formatT(set?.date)}</div>`;
                    } catch(e) {}
                }

                const div = document.createElement('div');
                div.className = 'small-card';
                div.innerHTML = `
                    <div class="tag" style="background:${p.naked_eye ? '#1e3a8a':'#374151'}; color:white; padding:2px 8px; border-radius:4px; font-size:10px; margin-bottom:8px; display:inline-block;">
                        ${p.naked_eye ? 'WIDOCZNA GOŁYM OKIEM' : 'WYMAGA TELESKOPU'}
                    </div>
                    <div style="font-weight:bold; font-size:1.2rem;">${planetyPl[p.name] || p.name}</div>
                    <div style="color:#34d399; font-size:0.9rem; margin:4px 0;">✨ Konstelacja: ${p.constellation}</div>
                    ${hoursHTML}
                `;
                container.appendChild(div);
            });
        } catch (e) {
            container.innerHTML = "Błąd ładowania danych o planetach.";
        }
    }

    // Funkcja Księżyca (bez zmian, bo działała)
    async function fetchMoon() {
        try {
            const res = await fetch('/api/get-moon');
            const d = await res.json();
            // ... (tutaj Twój działający kod renderowania Księżyca) ...
            // Upewnij się, że na końcu funkcji fetchMoon wywołujesz:
            loadVisiblePlanets(); 
        } catch (e) {
            console.error(e);
            loadVisiblePlanets(); // Wywołaj planety nawet jeśli Księżyc zawiedzie
        }
    }

    window.onload = fetchMoon;
   </script>


    
</body>
</html>
