<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niebo nad Warszawą</title>
    <script src="https://cosinekitty.github.io/astronomy/js/astronomy.browser.min.js"></script>
    <style>
        body { 
            background: #000000; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        h1 { margin-bottom: 30px; font-weight: 300; color: #f8fafc; text-align: center; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
        
        .card { 
            background: #111827; padding: 25px; border-radius: 24px; 
            width: 340px; border: 1px solid #1f2937; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }

        #visibility-badge {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase;
        }
        .visible { background: #065f46; color: #34d399; border: 1px solid #059669; }
        .hidden { background: #7f1d1d; color: #f87171; border: 1px solid #b91c1c; }

        #moon-img { width: 180px; height: 180px; border-radius: 50%; margin: 15px auto; display: block; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .item { background: #1f2937; padding: 10px; border-radius: 12px; font-size: 0.85rem; }
        .label { color: #6b7280; display: block; font-size: 0.7rem; margin-bottom: 4px; }
        .value { font-weight: bold; color: #f1f5f9; }

        /* Sekcje dolne */
        .section-title { width: 100%; max-width: 900px; margin-top: 40px; text-align: center; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; }
        .phases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }

        .small-card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 15px; text-align: center; }
        .past { opacity: 0.6; border-style: dashed; }
        
        /* Planety */
        .planet-name { font-size: 1.1rem; font-weight: bold; display: block; color: #fff; }
        .planet-const { color: #34d399; font-size: 0.85rem; margin: 5px 0; display: block; }
        .planet-hours { color: #fbbf24; font-size: 0.85rem; font-weight: bold; display: block; margin-top: 5px; }
        .tag { font-size: 0.65rem; font-weight: bold; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        .eye { background: #1e3a8a; color: #93c5fd; }
        .tel { background: #374151; color: #9ca3af; }

        .mini-moon { width: 50px; height: 50px; border-radius: 50%; margin: 10px auto 0; display: block; }
        #loader { padding: 50px; color: #4b5563; }
    </style>
</head>
<body>

    <h1>Niebo nad Warszawą</h1>

    <div class="container">
        <div class="card">
            <div id="loader">Pobieranie danych...</div>
            <div id="content" style="display:none">
                <div id="visibility-badge">Status</div>
                <div id="phase-name" style="font-size: 1.4rem; font-weight: bold;">-</div>
                <div id="phase-english" style="color: #6b7280; font-style: italic; margin-bottom: 10px;">-</div>
                <img id="moon-img" src="" alt="Księżyc">
                <div class="grid">
                    <div class="item"><span class="label">Oświetlenie</span><span class="value" id="illu">-</span></div>
                    <div class="item"><span class="label">Wschód</span><span class="value" id="rise">-</span></div>
                    <div class="item"><span class="label">Zachód</span><span class="value" id="set">-</span></div>
                    <div class="item"><span class="label">Dystans</span><span class="value" id="dist">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <h2 class="section-title">Najbliższe fazy księżyca</h2>
    <div id="upcoming-phases" class="phases-grid"></div>

    <h2 class="section-title">Planety nad Warszawą</h2>
    <div id="planets-list" class="phases-grid"></div>

    <script>
        const nazwyFaz = {
            "NEW_MOON": "Nów", "FIRST_QUARTER": "Pierwsza kwadra", "FULL_MOON": "Pełnia", "LAST_QUARTER": "Ostatnia kwadra",
            "WAXING_CRESCENT": "Przybywający sierp", "WAXING_GIBBOUS": "Przybywający garbaty",
            "WANING_GIBBOUS": "Ubywający garbaty", "WANING_CRESCENT": "Ubywający sierp"
        };

        const plikiZdjec = {
            "NEW_MOON": "NEW.jpg", "WAXING_CRESCENT": "WAXING-CRESCENT.jpg", "FIRST_QUARTER": "FIRST-QUARTER.jpg",
            "WAXING_GIBBOUS": "WAXING-GIBBOUS.jpg", "FULL_MOON": "FULL.jpg", "WANING_GIBBOUS": "WANING-GIBBOUS.jpg",
            "LAST_QUARTER": "THIRD-QUARTER.jpg", "WANING_CRESCENT": "WANING-CRESCENT.jpg"
        };

        const planetyPl = { "Mercury": "Merkury", "Venus": "Wenus", "Mars": "Mars", "Jupiter": "Jowisz", "Saturn": "Saturn", "Uranus": "Uran", "Neptune": "Neptun" };
        const LAT = 52.2297; const LON = 21.0122;

        function formatTime(date) { return date ? date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' }) : "--:--"; }

        async function loadPlanets() {
            try {
                const res = await fetch(`https://api.visibleplanets.dev/v2?latitude=${LAT}&longitude=${LON}`);
                const data = await res.json();
                const container = document.getElementById('planets-list');
                container.innerHTML = '';

                const observer = new Astronomy.Observer(LAT, LON, 0);
                const now = new Date();

                data.data.forEach(p => {
                    const riseObj = Astronomy.SearchRiseSet(p.name, observer, 1, now, 1);
                    const setObj = Astronomy.SearchRiseSet(p.name, observer, -1, now, 1);
                    
                    const card = document.createElement('div');
                    card.className = 'small-card';
                    if (p.altitude < 0) card.style.opacity = "0.4";

                    card.innerHTML = `
                        <div class="tag ${p.naked_eye ? 'eye' : 'tel'}">${p.naked_eye ? '👁️ OKO' : '🔭 TELESKOP'}</div>
                        <span class="planet-name">${planetyPl[p.name] || p.name}</span>
                        <span class="planet-const">✨ ${p.constellation}</span>
                        <span class="planet-hours">🌅 ${formatTime(riseObj?.date)} — 🌇 ${formatTime(setObj?.date)}</span>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function load() {
            try {
                const res = await fetch('/api/get-moon');
                const d = await res.json();
                
                document.getElementById('phase-name').innerText = nazwyFaz[d.details.phase] || d.details.phase;
                document.getElementById('phase-english').innerText = d.details.phase.replace(/_/g, ' ');
                document.getElementById('moon-img').src = "images/" + (plikiZdjec[d.details.phase] || "NEW.jpg");
                document.getElementById('illu').innerText = d.details.illumination;
                document.getElementById('rise').innerText = d.details.rise;
                document.getElementById('set').innerText = d.details.set;
                document.getElementById('dist').innerText = d.details.distance;

                const upcomingContainer = document.getElementById('upcoming-phases');
                upcomingContainer.innerHTML = '';
                d.upcoming.forEach(p => {
                    const card = document.createElement('div');
                    card.className = `small-card ${p.timestamp < 0 ? 'past' : ''}`;
                    card.innerHTML = `
                        <span style="color:#34d399; font-size:0.7rem; font-weight:bold">${p.daysText}</span>
                        <div style="font-size:0.85rem; margin:5px 0">${p.date}</div>
                        <span style="font-weight:bold; display:block">${nazwyFaz[p.name] || p.name}</span>
                        <img src="images/${plikiZdjec[p.name] || 'NEW.jpg'}" class="mini-moon">
                    `;
                    upcomingContainer.appendChild(card);
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                loadPlanets();
            } catch (e) { document.getElementById('loader').innerText = "Błąd połączenia z API"; }
        }
        load();
    </script>
</body>
</html>
