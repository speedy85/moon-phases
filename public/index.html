<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Księżyc nad Warszawą</title>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .card { background: #111827; padding: 30px; border-radius: 20px; border: 1px solid #1f2937; max-width: 400px; text-align: center; }
        img { width: 100%; border-radius: 50%; margin: 20px 0; box-shadow: 0 0 30px rgba(255,255,255,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        .item { background: #1f2937; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .label { color: #9ca3af; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="status">Ładowanie nieba...</h2>
        <div id="content" style="display:none">
            <img id="moon-img" src="">
            <div class="grid" id="data"></div>
        </div>
    </div>

    <script>
        async function getMoon() {
            try {
                const r = await fetch('/api/get-moon');
                const d = await r.json();
                document.getElementById('moon-img').src = d.image;
                const m = d.details;
                document.getElementById('data').innerHTML = `
                    <div class="item"><span class="label">Dystans</span>${Math.round(m.distance.fromEarth.km)} km</div>
                    <div class="item"><span class="label">Azymut</span>${m.position.horizontal.azimuth.degrees}°</div>
                    <div class="item"><span class="label">Wysokość</span>${m.position.horizontal.altitude.degrees}°</div>
                    <div class="item"><span class="label">Deklinacja</span>${m.position.equatorial.declination.degrees}°</div>
                `;
                document.getElementById('status').innerText = "Księżyc dzisiaj";
                document.getElementById('content').style.display = 'block';
            } catch (e) {
                document.getElementById('status').innerText = "Błąd połączenia.";
            }
        }
        getMoon();
    </script>
</body>
</html>
